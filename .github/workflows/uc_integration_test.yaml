name: "Unity Catalog Integration Test"
on:
  push:
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.txt'
jobs:
  test:
    name: "UC Commit Coordinator Integration Test"
    runs-on: ubuntu-24.04
    env:
      UC_VERSION: "0.4.0"
      CATALOG_NAME: "delta_test"
      SCHEMA: "default"
      MANAGED_CC_TABLE: "managed_cc_table"
      MANAGED_NON_CC_TABLE: "managed_non_cc_table"
    steps:
      - uses: actions/checkout@v3

      - name: Install Java 17
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache Scala, SBT
        uses: actions/cache@v3
        with:
          path: |
            ~/.sbt
            ~/.ivy2
            ~/.cache/coursier
          key: delta-sbt-cache-uc-integration

      # Resolve versions from build config
      - name: Get version info
        id: versions
        run: |
          DELTA_VERSION=$(grep 'version :=' version.sbt | sed 's/.*"\(.*\)"/\1/')
          echo "delta_version=${DELTA_VERSION}" >> $GITHUB_OUTPUT

          # Find the default Spark version from the exported JSON
          build/sbt exportSparkVersionsJson
          SPARK_FULL_VERSION=$(python3 -c "
          import json
          with open('target/spark-versions.json') as f:
              for v in json.load(f):
                  if v.get('isDefault'):
                      print(v['fullVersion'])
                      break
          ")
          SPARK_SUFFIX=$(python3 -c "
          import json
          with open('target/spark-versions.json') as f:
              for v in json.load(f):
                  if v.get('isDefault'):
                      print(v['packageSuffix'])
                      break
          ")
          echo "spark_full_version=${SPARK_FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "spark_suffix=${SPARK_SUFFIX}" >> $GITHUB_OUTPUT
          echo "Delta ${DELTA_VERSION}, Spark ${SPARK_FULL_VERSION}, suffix ${SPARK_SUFFIX}"

      # Step 1: Build UC OSS server from source
      - name: Clone and build Unity Catalog OSS
        run: |
          git clone --depth 1 --branch v${UC_VERSION} https://github.com/unitycatalog/unitycatalog.git /tmp/unitycatalog
          cd /tmp/unitycatalog
          build/sbt package

      # Step 2: Start UC server
      - name: Start Unity Catalog server
        run: |
          cd /tmp/unitycatalog

          # Configure UC server with managed tables enabled and in-memory H2 DB
          mkdir -p etc/conf
          cat > etc/conf/server.properties <<'EOF'
          server.env=test
          server.managed-table.enabled=true
          EOF

          bin/start-uc-server &

          # Wait for server to be ready (default port 8080)
          echo "Waiting for UC server to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/api/2.1/unity-catalog/catalogs > /dev/null 2>&1; then
              echo "UC server is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "UC server failed to start"
              exit 1
            fi
            sleep 1
          done

      # Step 3: Create catalog and schema via REST API
      - name: Set up UC catalog and schema
        run: |
          UC_BASE="http://localhost:8080/api/2.1/unity-catalog"

          curl -s -X POST "${UC_BASE}/catalogs" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${CATALOG_NAME}\", \"comment\": \"Delta integration test catalog\"}"

          curl -s -X POST "${UC_BASE}/schemas" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${SCHEMA}\", \"catalog_name\": \"${CATALOG_NAME}\"}"

          echo "Catalog and schema created successfully"

      # Step 4: Build and publish Delta to local Maven
      - name: Publish Delta to local Maven
        run: build/sbt publishM2

      # Step 5: Create managed tables via PySpark (needs Delta + UC packages)
      - name: Install PySpark and create managed tables
        env:
          CATALOG_URI: "http://localhost:8080"
          CATALOG_TOKEN: "static-token"
        run: |
          pip install pyspark==${{ steps.versions.outputs.spark_full_version }}

          DELTA_SPARK="io.delta:delta-spark${{ steps.versions.outputs.spark_suffix }}_2.13:${{ steps.versions.outputs.delta_version }}"
          UC_SPARK="io.unitycatalog:unitycatalog-spark_2.13:${UC_VERSION}"

          pyspark --packages "${DELTA_SPARK},${UC_SPARK}" \
            --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension \
            --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog \
            --conf "spark.sql.catalog.${CATALOG_NAME}=io.unitycatalog.spark.UCSingleCatalog" \
            --conf "spark.sql.catalog.${CATALOG_NAME}.uri=${CATALOG_URI}" \
            --conf "spark.sql.catalog.${CATALOG_NAME}.token=${CATALOG_TOKEN}" \
            << 'PYEOF'
          import os
          catalog = os.environ["CATALOG_NAME"]
          schema = os.environ["SCHEMA"]
          cc_table = os.environ["MANAGED_CC_TABLE"]
          non_cc_table = os.environ["MANAGED_NON_CC_TABLE"]

          spark.sql(f"CREATE TABLE {catalog}.{schema}.{cc_table} (id INT) USING DELTA TBLPROPERTIES ('delta.enableCatalogManagedCommit' = 'true')")
          spark.sql(f"CREATE TABLE {catalog}.{schema}.{non_cc_table} (id INT) USING DELTA")

          spark.createDataFrame([(1,), (2,), (3,)], ["id"]).write.insertInto(f"{catalog}.{schema}.{cc_table}")
          spark.createDataFrame([(1,), (2,), (3,)], ["id"]).write.insertInto(f"{catalog}.{schema}.{non_cc_table}")
          print("SUCCESS: Managed tables created and seeded")
          spark.stop()
          PYEOF

      # Step 6: Run UC commit coordinator integration tests
      - name: Run UC commit coordinator integration tests
        env:
          CATALOG_URI: "http://localhost:8080"
          CATALOG_TOKEN: "static-token"
        run: |
          DELTA_SPARK="io.delta:delta-spark${{ steps.versions.outputs.spark_suffix }}_2.13:${{ steps.versions.outputs.delta_version }}"
          UC_SPARK="io.unitycatalog:unitycatalog-spark_2.13:${UC_VERSION}"

          spark-submit \
            --driver-class-path python/delta/testing \
            --packages "${DELTA_SPARK},${UC_SPARK}" \
            python/delta/integration_tests/unity-catalog-commit-coordinator-integration-tests.py
